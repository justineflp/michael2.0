{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lodgio</title>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
    <div id="root">
        <!-- Glass Header -->
        <header class="glass-header" style="padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color: var(--brand-600); margin: 0; font-weight: 800; letter-spacing: -0.5px;">LODGIO</h2>
            <div>
                {% if user.is_authenticated %}
                    <span style="margin-right: 15px; font-weight: 600; font-size: 14px; color: var(--navy-700);">{{ user.email }}</span>
                    <a href="/login/" class="btn-ghost" style="padding: 6px 14px; font-size: 13px;">Sign Out</a>
                {% endif %}
            </div>
        </header>

        <!-- Main Content -->
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
